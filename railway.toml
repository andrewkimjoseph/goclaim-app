[build]
builder = "NIXPACKS"
buildCommand = "node_modules/.bin/prisma generate"

[deploy]
startCommand = 'curl -sf -X POST "$NEXT_PUBLIC_APP_URL/api/internal/trigger-claims" -H "Authorization: Bearer $CRON_SECRET" && node --import tsx/esm worker/runUntilDrained.ts'
restartPolicyType = "NEVER"
cronSchedule = "0 12 * * *"